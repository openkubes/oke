name: OKE Build & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openkubes/oke

jobs:
  # -------------------------------------------------------------------------
  # Build OKE binary — amd64 + arm64 (native runners, kein QEMU)
  # -------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            goarch: amd64
          - arch: arm64
            runner: ubuntu-22.04-arm
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: sudo apt-get install -y libseccomp-dev

      - name: Build OKE binary
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          GOOS: linux
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p dist

          # Fetch the exact Go version Kubernetes requires
          KUBERNETES_VERSION="v1.35.5"
          VERSION_GOLANG="go$(curl -sL https://raw.githubusercontent.com/kubernetes/kubernetes/${KUBERNETES_VERSION}/.go-version | tr -d '[:space:]')"

          # Image versions from scripts/version.sh
          KUBERNETES_IMAGE_TAG="v1.35.5-rke2r2-build20260521"
          ETCD_VERSION="v3.6.7-k3s1-build20260512"
          PAUSE_VERSION="3.6"
          CCM_VERSION="v1.35.4-0.20260415195656-e51c0636351d-build20260415"
          KLIPPERHELM_VERSION="v0.10.0-build20260513"
          KLIPPERLB_VERSION="v0.4.17"
          K3S_PKG="github.com/k3s-io/k3s"
          HELMCTR_PKG="github.com/k3s-io/helm-controller"
          OKE_PKG="github.com/openkubes/oke"

          GOEXPERIMENT=boringcrypto go build \
            -tags "selinux netgo osusergo no_stage static_build sqlite_omit_load_extension exclude_graphdriver_devicemapper exclude_graphdriver_btrfs" \
            -ldflags "-s -w \
              -extldflags \"-static\" \
              -X ${K3S_PKG}/pkg/version.Program=oke \
              -X ${K3S_PKG}/pkg/version.Version=${VERSION} \
              -X ${K3S_PKG}/pkg/version.GitCommit=${COMMIT} \
              -X ${K3S_PKG}/pkg/version.UpstreamGolang=${VERSION_GOLANG} \
              -X ${OKE_PKG}/pkg/version.Version=${VERSION} \
              -X ${OKE_PKG}/pkg/version.GitCommit=${COMMIT} \
              -X ${OKE_PKG}/pkg/version.BuildDate=${BUILD_DATE} \
              -X ${OKE_PKG}/pkg/images.DefaultEtcdImage=rancher/hardened-etcd:${ETCD_VERSION} \
              -X ${OKE_PKG}/pkg/images.DefaultKubernetesImage=rancher/hardened-kubernetes:${KUBERNETES_IMAGE_TAG} \
              -X ${OKE_PKG}/pkg/images.DefaultPauseImage=rancher/mirrored-pause:${PAUSE_VERSION} \
              -X ${OKE_PKG}/pkg/images.DefaultRuntimeImage=rancher/rke2-runtime:v1.35.5-rke2r2 \
              -X ${OKE_PKG}/pkg/images.DefaultCloudControllerManagerImage=rancher/rke2-cloud-provider:${CCM_VERSION} \
              -X ${HELMCTR_PKG}/pkg/controllers/chart.DefaultJobImage=rancher/klipper-helm:${KLIPPERHELM_VERSION} \
              -X ${K3S_PKG}/pkg/cloudprovider.DefaultLBImage=rancher/klipper-lb:${KLIPPERLB_VERSION}" \
            -o dist/oke-linux-${{ matrix.goarch }} \
            ./

      - name: Smoke test — binary runs
        if: matrix.arch == 'amd64'
        run: |
          chmod +x dist/oke-linux-amd64
          ./dist/oke-linux-amd64 --version || ./dist/oke-linux-amd64 --help

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: oke-linux-${{ matrix.arch }}
          path: dist/oke-linux-${{ matrix.goarch }}
          retention-days: 7

  # -------------------------------------------------------------------------
  # Release — nur bei Tags (v*)
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Flatten dist/
        run: |
          find dist/ -name "oke-linux-*" -exec mv {} dist/ \; 2>/dev/null || true
          chmod +x dist/oke-linux-*
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum oke-linux-* > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OKE ${{ github.ref_name }}"
          body: |
            ## OKE ${{ github.ref_name }}

            OpenKubes Kubernetes Engine — RKE2 fork running on any Linux.
            ok-linux is the native, optimized platform.

            ### Install

            ```bash
            # Any Linux (Ubuntu/Debian)
            curl -sfL https://get.openkubes.io | sh -s - server

            # With ok-linux auto-detection
            curl -sfL https://get.openkubes.io | OKE_NATIVE=auto sh -s - server
            ```

            ### Downloads

            | Binary | Architecture |
            |---|---|
            | `oke-linux-amd64` | x86_64 |
            | `oke-linux-arm64` | ARM64 |

            ### Verify

            ```bash
            sha256sum -c sha256sums.txt
            ```

            ### Base
            Fork of [rancher/rke2](https://github.com/rancher/rke2) v1.35.5+rke2r2
          files: |
            dist/oke-linux-amd64
            dist/oke-linux-arm64
            dist/sha256sums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

  # -------------------------------------------------------------------------
  # Container Image — GHCR (nur bei Tags und main-Push)
  # -------------------------------------------------------------------------
  container:
    name: Container Image
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: oke-linux-amd64
          path: dist/

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: oke-linux-arm64
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
